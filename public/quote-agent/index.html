      }

      function openTermTypePicker(input) {
        state.activeTermTypeInput = input;
        $("termTypePicker").hidden = false;
        $("termTypePickerSearch").value = "";
        renderTermTypePickerResults("");
        setTimeout(() => $("termTypePickerSearch").focus(), 0);
      }

      function closeTermTypePicker() {
        $("termTypePicker").hidden = true;
        state.activeTermTypeInput = null;
      }

      async function loadDictionaryOptions() {
        const [termTypeResult, valueResult, productTypeResult] = await Promise.all([
          api("/productConfigAgent/dictionary/term-types"),
          api("/productConfigAgent/dictionary/values"),
          api("/productConfigAgent/dictionary/product-types"),
        ]);
        state.termTypes = termTypeResult.termTypes || [];
        state.values = valueResult.values || [];
        state.productTypes = Array.isArray(productTypeResult) ? productTypeResult : [];
      }

      function renderAliasLoading() {
        return '<div class="alias-list muted">应用 DeepSeek JSON 后会在这里填充 alias。</div>';
      }

      function renderAliasChecks(aliases = []) {
        if (!aliases.length) {
          return '<div class="alias-list muted">模型没有给出 alias，可手动新增。</div>';
        }

        return `
          <div class="alias-list">
            ${aliases
              .map(
                (alias) => `
                  <label>
                    <input type="checkbox" name="aliasNames" value="${escapeHtml(alias)}" checked>
                    ${escapeHtml(alias)}
                  </label>
                `,
              )
              .join("")}
          </div>
        `;
      }

      function renderManualAliasInput(name, placeholder) {
        return `<input class="full" name="${name}" placeholder="${placeholder}，多个可用逗号或换行分隔">`;
      }

      function renderEnumValueInputs(candidate) {
        const rawValue = String(candidate.rawValue || "").trim();
        return `
          <div class="enum-value-inputs">
            <div class="form-title">枚举字段值（可选）</div>
            <input class="full" name="valueCanonicalValue" placeholder="标准字段值，例如 12.9高强度" value="${escapeHtml(rawValue)}">
            ${renderManualAliasInput("valueAliasNamesManual", "手动添加字段值 alias")}
            <div class="hint full">只有字段类型为“枚举”时才需要填写。原始抽取值会自动记录为字段值 alias，手动 alias 只用于补充其他叫法。</div>
          </div>
        `;
      }

      function renderSplitRows(candidate, rows = []) {
        const list = rows.length
          ? rows
          : [
              {
                termType: candidate.termType,
                rawValue: candidate.rawValue || "",
              },
            ];

        return `
          <div class="split-rows">
            ${list
              .map((row, index) => renderSplitRow(row, index === 0))
              .join("")}
          </div>
        `;
      }

      function renderSplitRow(row = {}, locked = false) {
        return `
          <div class="split-row">
            <label class="field-label">
              字段 Key
              <input type="hidden" name="splitTermType" value="${escapeHtml(row.termType || "")}" data-termtype-preview-source>
              <button type="button" data-open-termtype-picker>选择字段 Key</button>
              <div class="termtype-selected muted">${escapeHtml(termTypeLabel(row.termType || ""))}</div>
            </label>
            <label class="field-label full">
              原始值 / 文本值
              <input name="splitRawValue" value="${escapeHtml(row.rawValue || row.value || row.displayName || row.canonicalValue || "")}" placeholder="例如 按客户要求的进料口尺寸">
            </label>
            <button type="button" data-remove-split-row ${locked ? "disabled" : ""}>删除</button>
          </div>
        `;
      }

      function collectSplitRows(form) {
        const rows = [];
        form.querySelectorAll(".split-row").forEach((row) => {
          const termType = row.querySelector('[name="splitTermType"]')?.value.trim();
          const rawValue = row
            .querySelector('[name="splitRawValue"]')
            ?.value.trim();
          if (termType && rawValue) {
            rows.push({ termType, rawValue });
          }
        });
        return rows;
      }

      function shouldSplitCandidateAsEnums(candidate) {
        const termType = findTermType(candidate.termType);
        return candidate.valueKind === "enums" || termType?.valueKind === "enums";
      }

      function splitEnumRawValue(rawValue, termType, forceTokenSpaceSplit = false) {
        const trimmed = String(rawValue || "").trim();
        if (!trimmed) return [];
        const allowSpaceSplit = [
          "plastic_material",
          "applicable_plastic_material",
          "applicable_process_type",
          "application_type",
          "surface_treatment_requirement",
          "accessory_list",
        ].includes(termType);
        const delimiterParts = trimmed
          .split(/[、，,;；\/＋+\n]/)
          .map((part) => part.trim())
          .filter(Boolean);
        const parts = [];
        delimiterParts.forEach((part) => {
          const shouldSplitSpace =
            part.includes(" ") &&
            (allowSpaceSplit || (forceTokenSpaceSplit && /^[A-Za-z0-9_\-.]+(?:\s+[A-Za-z0-9_\-.]+)+$/.test(part)));
          if (shouldSplitSpace) {
            parts.push(...part.split(/\s+/).map((item) => item.trim()).filter(Boolean));
          } else {
            parts.push(part);
          }
        });
        const seen = new Set();
        return parts.filter((part) => {
          const key = part.toLowerCase();
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function defaultValueRowsForCandidate(candidate) {
        const sourceRawValue = candidate.evidence?.sourceRawValue || candidate.rawValue || "";
        if (!shouldSplitCandidateAsEnums(candidate)) {
          return [
            {
              canonicalValue: candidate.rawValue || "",
              displayName: candidate.rawValue || "",
              aliasNames: [],
            },
          ];
        }
        const tokens = splitEnumRawValue(sourceRawValue, candidate.termType, true);
        const fallback = candidate.rawValue ? [candidate.rawValue] : [];
        return (tokens.length ? tokens : fallback).map((token) => ({
          canonicalValue: token,
          displayName: token,
          aliasNames: [token],
        }));
      }

      function renderValueRows(candidate, rows = []) {
        const list = rows.length
          ? rows
          : defaultValueRowsForCandidate(candidate);
        return `
          <div class="value-rows">
            ${list
              .map((row, index) => renderValueRow(row, index === 0))
              .join("")}
          </div>
        `;
      }

      function renderValueRow(row, locked = false) {
        const aliases = Array.isArray(row.aliasNames)
          ? row.aliasNames.join("，")
          : Array.isArray(row.aliases)
            ? row.aliases.join("，")
            : "";
        return `
          <div class="value-row">
            <label class="field-label">
              标准值 key
              <input name="valueRowCanonicalValue" value="${escapeHtml(row.canonicalValue || "")}" placeholder="例如 下挤出">
            </label>
            <label class="field-label">
              显示名称
              <input name="valueRowDisplayName" value="${escapeHtml(row.displayName || row.canonicalValue || "")}" placeholder="例如 下挤出">
            </label>
            <label class="field-label">
              字段值 alias
              <input name="valueRowAliasNames" value="${escapeHtml(aliases)}" placeholder="多个可用逗号或换行分隔">
            </label>
            <button type="button" data-remove-value-row ${locked ? "disabled" : ""}>删除</button>
          </div>
        `;
      }

      function collectValueRows(form) {
        const rows = [];
        form.querySelectorAll(".value-row").forEach((row) => {
          const canonicalValue = row
            .querySelector('[name="valueRowCanonicalValue"]')
            ?.value.trim();
          const displayName = row
            .querySelector('[name="valueRowDisplayName"]')
            ?.value.trim();
          const aliasText = row.querySelector('[name="valueRowAliasNames"]')?.value || "";
          const aliasNames = aliasText
            .split(/[,\n，、]/)
            .map((item) => item.trim())
            .filter(Boolean);
          if (canonicalValue) {
            rows.push({
              canonicalValue,
              displayName: displayName || canonicalValue,
              aliasNames,
            });
          }
        });
        return rows;
      }

      function shouldSuppressCandidateRawAlias(form, rows) {
        if (rows.length <= 1) return false;
        const candidate = form.closest(".candidate")?._candidate;
        if (!candidate || !shouldSplitCandidateAsEnums(candidate)) return false;
        const sourceRawValue = candidate.evidence?.sourceRawValue || candidate.rawValue || "";
        return splitEnumRawValue(sourceRawValue, candidate.termType, true).length > 1;
      }

      function valueCreateBodyFromForm(form) {
        const rows = collectValueRows(form);
        if (!rows.length) {
          throw new Error("至少填写一个标准字段值");
        }
        const [first, ...extra] = rows;
        return {
          canonicalValue: first.canonicalValue,
          displayName: first.displayName,
          aliasNames: first.aliasNames,
          values: extra,
          suppressCandidateRawAlias: shouldSuppressCandidateRawAlias(form, rows),
        };
      }

      function setFirstValueRow(form, value) {
        const row = form?.querySelector(".value-row");
        if (!row) return;
        const canonical = row.querySelector('[name="valueRowCanonicalValue"]');
        const display = row.querySelector('[name="valueRowDisplayName"]');
        const aliases = row.querySelector('[name="valueRowAliasNames"]');
        if (canonical && value.canonicalValue) canonical.value = value.canonicalValue;
        if (display && value.displayName) display.value = value.displayName;
        if (aliases && Array.isArray(value.aliasNames)) {
          aliases.value = value.aliasNames.join("，");
        }
      }

      function syncEnumValueInputs(form) {
        const valueKindSelect = form?.querySelector('select[name="valueKind"]');
        const termTypeInput = form?.querySelector("[data-termtype-preview-source]");
        const selectedTermType = termTypeInput ? findTermType(termTypeInput.value) : null;
        const valueKind =
          valueKindSelect?.value || selectedTermType?.valueKind || "enum";
        form?.querySelectorAll(".enum-value-inputs").forEach((node) => {
          node.hidden = valueKind !== "enum" && valueKind !== "enums";
        });
      }

      function candidateCard(candidate, type) {
        const isTermType = type === "term_type";
        const title = isTermType
          ? `${candidate.rawFieldName} -> ${candidate.rawValue || ""}`
          : `${findTermType(candidate.termType)?.displayName || candidate.termType}: ${candidate.rawValue}`;
        const createAction = isTermType
          ? `/productConfigAgent/candidates/term-type/${candidate.id}/create-term-type`
          : `/productConfigAgent/candidates/value/${candidate.id}/create-value`;
        const aliasAction = isTermType
          ? `/productConfigAgent/candidates/term-type/${candidate.id}/approve-as-alias`
          : `/productConfigAgent/candidates/value/${candidate.id}/approve-as-alias`;
        const rejectType = isTermType ? "term-type" : "value";
        const sourceProductType = candidate.sourceProductType || "unknown";
        const defaultApplicable =
          isTermType && sourceProductType && sourceProductType !== "unknown"
            ? [sourceProductType]
            : [];
        const applicableWarning = (() => {
          if (!isTermType || !sourceProductType || sourceProductType === "unknown") {
            return "";
          }
          const target = findTermType(candidate.proposedTermType || "");
          const applicable = target?.applicableProductTypes || [];
          if (
            target &&
            applicable.length &&
            !applicable.includes("common") &&
            !applicable.includes(sourceProductType)
          ) {
            return `<div class="hint full">该字段来自 ${escapeHtml(productTypeLabel(sourceProductType))} item，但目标字段当前不适用于该产品类型，必要时请追加适用产品类型。</div>`;
          }
          return "";
        })();

        return `
          <div class="candidate" data-type="${type}" data-id="${candidate.id}">
            <div class="row">
              <input type="checkbox" data-review-select style="width: auto; min-height: auto">
              <b>#${candidate.id}</b>
              <span>${title}</span>
              <span class="tag">${candidate.status}</span>${candidate.valueKind === "enums" && !isTermType ? '<span class="tag enums">多值</span>' : ""}
            </div>
            <div class="muted">${candidate.reason || ""}</div>${candidate.evidence?.sourceRawValue && !isTermType ? `<div class="muted">来源值：${escapeHtml(candidate.evidence.sourceRawValue)}</div>` : ""}
            <div class="muted">document #${candidate.documentId || "-"} · extraction #${candidate.extractionResultId || "-"} · item #${candidate.itemIndex || candidate.latestOccurrence?.itemIndex || "-"} · source ${escapeHtml(productTypeLabel(sourceProductType))}</div>
            ${renderCandidateDocuments(candidate)}
            ${applicableWarning}
            <div class="review-actions">
              <button type="button" data-review-action="create">${isTermType ? "新增字段 Key" : "新增标准字段值"}</button>
              <button type="button" data-review-action="alias">归属已有 alias</button>
              ${isTermType ? "" : '<button type="button" data-review-action="kind">修改字段类型</button>'}
              ${isTermType ? "" : '<button type="button" data-review-action="move">移动字段 Key</button>'}
              ${isTermType ? "" : '<button type="button" data-review-action="split">拆分字段</button>'}
              <button type="button" data-review-action="reject">拒绝</button>
            </div>
            ${renderReviewSuggestion(candidate)}
            ${isTermType ? "" : renderValueCandidateTermInfo(candidate.termType)}
            <form class="review-form" hidden data-form-kind="create" ${isTermType ? "" : 'data-value-create="1"'} data-action="${createAction}">
              ${
                isTermType
                  ? `
                    <div class="form-title">新增为字段 Key</div>
                    <input name="termType" placeholder="字段 Key（英文，例如 screw_spec）" value="${escapeHtml(suggestFieldKey(candidate))}" title="字段 Key 是系统内部标准字段名，建议用英文 snake_case，例如 screw_spec。">
                    <input name="displayName" placeholder="中文字段名" value="${escapeHtml(candidate.rawFieldName || "")}">
                    <input name="quoteDisplayName" placeholder="报价显示名，可为空">
                    <input name="category" placeholder="分类，例如 product_config / document_info">
                    <input name="sortOrder" type="number" placeholder="排序，例如 100" value="100">
                    <select name="valueKind">
                      ${valueKindOptions("enum")}
                    </select>
                    <textarea class="full" name="description" placeholder="字段说明，可为空"></textarea>
                    <div class="form-title">适用产品类型</div>
                    ${renderProductTypeChecks(defaultApplicable)}
                    <div class="suggested-aliases">${renderAliasLoading()}</div>
                    ${renderManualAliasInput("aliasNamesManual", "手动添加字段 Key alias")}
                    ${renderEnumValueInputs(candidate)}
                  `
                  : `
                    <div class="form-title">新增为标准字段值</div>
                    ${renderValueRows(candidate)}
                    <button type="button" data-add-value-row>添加更多标准值</button>
                  `
              }
              <button class="primary">新增</button>
              <div class="hint full">${
                isTermType
                  ? "适合确实是一个新字段时使用。第一个框填内部字段 Key，第二个框填给人看的中文名。"
                  : "第一行会用于解决当前候选；后续行会额外加入同一个字段 Key 的标准值。"
              }</div>
            </form>
            <form class="review-form" hidden data-form-kind="alias" data-action="${aliasAction}">
              <div class="form-title">归属为已有 alias</div>
              ${
                isTermType
                  ? `<input type="hidden" name="termType" data-termtype-preview-source><button type="button" data-open-termtype-picker>选择字段 Key</button><div class="termtype-selected muted">未选择字段 Key</div><select name="valueKind">${valueKindOptions("", true)}</select><div class="termtype-preview-target">${renderTermTypePreview("")}</div><div class="suggested-aliases">${renderAliasLoading()}</div>${renderManualAliasInput("aliasNamesManual", "手动添加字段 Key alias")}${renderEnumValueInputs(candidate)}`
                  : `<select name="termId">${valueOptions(candidate.termType)}</select><span></span><span></span>${renderManualAliasInput("aliasNamesManual", "手动添加字段值 alias")}`
              }
              <button>归属为 alias</button>
              <div class="hint full">${
                isTermType
                  ? "适合同一个字段的不同叫法，比如“紧固件（螺丝）”归属到已有字段 Key。"
                  : "适合同一个标准值的不同写法，比如“12.9高强度”归属到已有字段值。"
              }</div>
            </form>
            ${
              isTermType
                ? ""
                : `<form class="review-form" hidden data-form-kind="kind" data-action="/productConfigAgent/candidates/value/${candidate.id}/update-term-type-kind">
                    <div class="form-title">修改字段类型</div>
                    <input name="termType" value="${escapeHtml(candidate.termType)}" readonly>
                    <select name="valueKind">${valueKindOptions(findTermType(candidate.termType)?.valueKind || "enum")}</select>
                    <span></span>
                    <button class="primary">保存类型</button>
                    <div class="hint full">如果这个字段本质是长文本，比如“按公司标准配置,多配...”，建议改为 text。保存后会重新归一化当前合同。</div>
                  </form>`
            }
            ${
              isTermType
                ? ""
                : `<form class="review-form" hidden data-form-kind="move" data-action="/productConfigAgent/candidates/value/${candidate.id}/move-to-term-type">
                    <div class="form-title">移动到其他字段 Key</div>
                    <input type="hidden" name="termType" data-termtype-preview-source>
                    <button type="button" data-open-termtype-picker>选择字段 Key</button>
                    <div class="termtype-selected muted">未选择字段 Key</div>
                    <input name="rawValue" value="${escapeHtml(candidate.rawValue || "")}" placeholder="移动后的字段值">
                    <input class="full" name="reason" placeholder="移动原因">
                    <div class="termtype-preview-target">${renderTermTypePreview("")}</div>
                    <button class="primary">确认移动</button>
                    <div class="hint full">适合 key/value 错配：先把候选移动到正确字段 Key，再继续按正确字段审核字段值。</div>
                  </form>`
            }
            ${
              isTermType
                ? ""
                : `<form class="review-form" hidden data-form-kind="split" data-action="/productConfigAgent/candidates/value/${candidate.id}/split">
                    <div class="form-title">拆分字段</div>
                    <div class="hint full">适合“CPE流延缠绕膜”这类把材料、工艺、应用类型写在一起的值。可先生成 DeepSeek Prompt 获取建议，再人工确认。</div>
                    <button type="button" data-suggest-split>生成 DeepSeek Prompt</button>
                    <div class="split-target full">${renderSplitRows(candidate, [])}</div>
                    <button type="button" data-add-split-row>添加拆分字段</button>
                    <button class="primary">确认拆分</button>
                  </form>`
            }
            <form class="review-form" hidden data-form-kind="reject" data-action="/productConfigAgent/candidates/${rejectType}/${candidate.id}/reject">
              <input class="full" name="reason" placeholder="拒绝原因">
              <button class="danger">拒绝</button>
            </form>
          </div>
        `;
      }

      function wireCandidateForms(root) {
        root.querySelectorAll(".candidate").forEach((card) => {
          const candidateList =
            card.dataset.type === "term_type"
              ? state.currentTermTypeCandidates || []
              : state.currentValueCandidates || [];
          card._candidate =
            candidateList.find((item) => String(item.id) === String(card.dataset.id)) ||
            null;
          card.querySelectorAll("[data-apply-suggestion]").forEach((button) => {
            button.addEventListener("click", () => applySuggestionToCard(card));
          });
          card.querySelectorAll("[data-review-action]").forEach((button) => {
            button.addEventListener("click", () => {
              const action = button.dataset.reviewAction;
              card.querySelectorAll("[data-review-action]").forEach((item) => {
                item.classList.toggle("active", item === button);
              });
              card.querySelectorAll(".review-form").forEach((form) => {
                form.hidden = form.dataset.formKind !== action;
                if (!form.hidden) {
                  syncEnumValueInputs(form);
                }
              });
            });
          });
          const updateTermTypePreviewSource = (select) => {
            const form = select.closest("form");
            const row = select.closest(".split-row");
            const target = form?.querySelector(".termtype-preview-target");
            const selected = findTermType(select.value);
            if (target) {
              target.innerHTML = renderTermTypePreview(select.value);
            }
            const label = row?.querySelector(".termtype-selected") || form?.querySelector(".termtype-selected");
            if (label) {
              label.textContent = termTypeLabel(select.value);
            }
            const valueKindSelect = form?.querySelector('select[name="valueKind"]');
            if (valueKindSelect && selected && !valueKindSelect.value) {
              valueKindSelect.value = selected.valueKind || "enum";
            }
            syncEnumValueInputs(form);
          };
          const wireTermTypePreviewSource = (select) => {
            if (!select || select.dataset.previewWired === "1") return;
            select.dataset.previewWired = "1";
            select.addEventListener("change", () => updateTermTypePreviewSource(select));
            updateTermTypePreviewSource(select);
          };
          card.querySelectorAll("[data-termtype-preview-source]").forEach(wireTermTypePreviewSource);
          card.querySelectorAll("[data-open-document]").forEach((button) => {
            button.addEventListener("click", async () => {
              try {
                const documentId = button.dataset.openDocument;
                setStatus(`正在打开 document #${documentId}...`);
                await api(`/productConfigAgent/documents/${documentId}/open-file`, {
                  method: "POST",
                });
                setStatus(`已请求打开 document #${documentId} 的文件。`);
              } catch (error) {
                setStatus(error.message);
              }
            });
          });
          card.querySelectorAll('select[name="valueKind"]').forEach((select) => {
            const form = select.closest("form");
            select.addEventListener("change", () => syncEnumValueInputs(form));
            syncEnumValueInputs(form);
          });
          card.querySelectorAll("[data-suggest-split]").forEach((button) => {
            button.addEventListener("click", () => {
              $("suggestionPromptText").value = buildDeepSeekReviewPrompt();
              $("suggestionResponseText").value = "";
              $("manualSuggestionModal").hidden = false;
              setStatus("请用 DeepSeek 批量预审返回 split_value 建议，再点采用推荐。");
            });
          });
          card.querySelectorAll("[data-add-value-row]").forEach((button) => {
            button.addEventListener("click", () => {
              const form = button.closest("form");
              const target = form?.querySelector(".value-rows");
              if (!target) return;
              target.insertAdjacentHTML(
                "beforeend",
                renderValueRow(
                  { canonicalValue: "", displayName: "", aliasNames: [] },
                  false,
                ),
              );
            });
          });
          card.querySelectorAll("[data-add-split-row]").forEach((button) => {
            button.addEventListener("click", () => {
              const form = button.closest("form");
              const target = form?.querySelector(".split-rows");
              if (!target) return;
              target.insertAdjacentHTML(
                "beforeend",
                renderSplitRow(
                  { termType: "", rawValue: "" },
                  false,
                ),
              );
              const input = target.querySelector(".split-row:last-child [data-termtype-preview-source]");
              if (input) wireTermTypePreviewSource(input);
            });
          });
          card.addEventListener("click", (event) => {
            const termTypeButton = event.target.closest?.("[data-open-termtype-picker]");
            if (termTypeButton) {
              const form = termTypeButton.closest("form");
              const input =
                termTypeButton.closest(".split-row")?.querySelector("[data-termtype-preview-source]") ||
                form?.querySelector("[data-termtype-preview-source]");
              if (input) {
                wireTermTypePreviewSource(input);
                openTermTypePicker(input);
              }
            }
            const removeButton = event.target.closest?.("[data-remove-value-row]");
            if (removeButton && !removeButton.disabled) {
              removeButton.closest(".value-row")?.remove();
            }
            const removeSplitButton = event.target.closest?.("[data-remove-split-row]");
            if (removeSplitButton && !removeSplitButton.disabled) {
              removeSplitButton.closest(".split-row")?.remove();
            }
          });
        });
        root.querySelectorAll("form[data-action]").forEach((form) => {
          form.addEventListener("submit", async (event) => {
            event.preventDefault();
            try {
              setStatus("审核中...");
              const body =
                form.dataset.formKind === "split"
                  ? { splits: collectSplitRows(form) }
                  : form.dataset.valueCreate === "1"
                    ? valueCreateBodyFromForm(form)
                  : bodyFromForm(form);
              const card = form.closest(".candidate");
              if (card?.dataset.type === "term_type") {
                body.deferCandidateRecheck = true;
              }
              if (form.dataset.formKind === "split" && body.splits.length === 0) {
                throw new Error("请至少填写一行拆分：字段 Key + 原始值/文本值或标准值");
              }
              const result = await api(form.dataset.action, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
              });
              await refreshCandidates();
              if ((result?.refreshed?.length ?? 0) > 0) {
                await refreshContract();
              }
              const refreshedCount = result?.refreshed?.length ?? 0;
              const affectedCount = result?.affectedDocumentIds?.length ?? 0;
              setStatus(
                refreshedCount > 0
                  ? `审核完成，已刷新 ${refreshedCount} 个相关合同。`
                  : `审核完成，已跳过合同重归一化；受影响合同 ${affectedCount} 个。`,
              );
            } catch (error) {
              setStatus(error.message);
            }
          });
        });
      }

      function reviewActionFromForm(card, form) {
        const type = card.dataset.type;
        const kind = form.dataset.formKind;
        if (type === "term_type" && kind === "create") return "create_term_type";
        if (type === "term_type" && kind === "alias") return "approve_term_type_as_alias";
        if (type === "value" && kind === "create") return "create_value";
        if (type === "value" && kind === "alias") return "approve_value_as_alias";
        if (type === "value" && kind === "kind") return "update_term_type_value_kind";
        if (type === "value" && kind === "move") return "move_value_to_other_term_type";
        if (type === "value" && kind === "split") return "split_value";
        if (kind === "reject") return "reject";
        throw new Error("无法识别当前展开的审核动作");
      }

      function reviewPayloadFromForm(form) {
        if (form.dataset.formKind === "split") {
          const splits = collectSplitRows(form);
          if (!splits.length) {
            throw new Error("请至少填写一行拆分：字段 Key + 原始值/文本值或标准值");
          }
          return { splits };
        }
        if (form.dataset.valueCreate === "1") {
          return valueCreateBodyFromForm(form);
        }
        return bodyFromForm(form);
      }

      function selectedReviewOperations() {
        const cards = [
          ...document.querySelectorAll(".candidate input[data-review-select]:checked"),
        ].map((input) => input.closest(".candidate"));
        return cards.map((card) => {
          const form = card.querySelector('form.review-form:not([hidden])');
          if (!form) {
            throw new Error(`candidate #${card.dataset.id} 还没有选择审核动作`);
          }
          return {
            candidateType: card.dataset.type,
            candidateId: card.dataset.id,
            action: reviewActionFromForm(card, form),
            payload: reviewPayloadFromForm(form),
          };
        });
      }

      async function refreshCandidates() {
        const status = $("candidateStatus").value;
        setStatus("候选刷新中...");
        await loadDictionaryOptions();
        const params = new URLSearchParams({ status });
        if (!state.showGlobalCandidates && state.documentId) {
          params.set("documentId", String(state.documentId));
        }
        const data = await api(`/productConfigAgent/candidates?${params.toString()}`);
        state.currentTermTypeCandidates = data.termTypeCandidates || [];
        state.currentValueCandidates = data.valueCandidates || [];
        const appliedSuggestions = loadAppliedSuggestions();
        if (appliedSuggestions) {
          applyManualReviewSuggestions(appliedSuggestions);
        }
        renderCandidateLists();
        $("candidateScope").textContent =
          state.showGlobalCandidates || !state.documentId
            ? "当前显示：全局候选"
            : `当前显示：document #${state.documentId} 的候选`;
        setStatus(
          `候选已刷新：termType ${data.termTypeCandidates?.length || 0}，value ${data.valueCandidates?.length || 0}`,
        );
      }

      function renderCandidateLists() {
        $("termTypeCandidates").innerHTML = state.currentTermTypeCandidates.length
          ? state.currentTermTypeCandidates
              .map((item) => candidateCard(item, "term_type"))
              .join("")
          : '<span class="muted">暂无 termType candidates。</span>';
        $("valueCandidates").innerHTML = state.currentValueCandidates.length
          ? state.currentValueCandidates.map((item) => candidateCard(item, "value")).join("")
          : '<span class="muted">暂无 value candidates。</span>';
        wireCandidateForms($("termTypeCandidates"));
        wireCandidateForms($("valueCandidates"));
      }

      async function generateBatchSuggestions() {
        if (!state.currentTermTypeCandidates.length && !state.currentValueCandidates.length) {
          await refreshCandidates();
        }
        const scopedCandidates = candidatesForPrompt();
        if (
          !scopedCandidates.termTypeCandidates.length &&
          !scopedCandidates.valueCandidates.length
        ) {
          setStatus(
            state.documentId
              ? `document #${state.documentId} 当前没有候选可生成 Prompt。`
              : "当前没有候选可生成 Prompt。",
          );
          return;
        }
        $("suggestionPromptText").value = buildDeepSeekReviewPrompt();
        loadSuggestionDraft();
        $("manualSuggestionModal").hidden = false;
        setStatus(
          `已生成 DeepSeek Prompt：字段 Key ${scopedCandidates.termTypeCandidates.length}，字段值 ${scopedCandidates.valueCandidates.length}。`,
        );
      }

      async function submitSelectedCandidateReviews() {
        const operations = selectedReviewOperations();
        if (!operations.length) {
          throw new Error("请先勾选至少一个候选，并选择/填写审核动作");
        }
        $("submitSelectedCandidateReviews").disabled = true;
        setStatus(`正在批量提交 ${operations.length} 个候选审核...`);
        try {
          const result = await api("/productConfigAgent/candidates/reviews/batch", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ operations, deferCandidateRecheck: true }),
          });
          await Promise.all([refreshCandidates(), refreshDocuments()]);
          setStatus(
            `批量审核完成：成功 ${result.successCount || 0}，失败 ${result.failedCount || 0}，受影响合同 ${(result.affectedDocumentIds || []).length} 个，已标记待重归一化。`,
          );
        } finally {
          $("submitSelectedCandidateReviews").disabled = false;
        }
      }

      async function refreshContract() {
        if (!state.documentId) return;
        const data = await api(`/productConfigAgent/extractions/${state.documentId}`);
        const dictionary = data.dictionary_proposals;
        state.dictionary = dictionary;
        renderSummary(dictionary?.summary);
        renderItems(dictionary?.items);
        $("warnings").textContent = JSON.stringify(dictionary?.warnings || [], null, 2);
      }

      async function reextractCurrentDocument() {
        if (!state.documentId) {
          throw new Error("请先从左侧选择一个 document");
        }
        $("reextractCurrentDocument").disabled = true;
        setStatus(`正在重新 LLM 解析 document #${state.documentId}...`);
        try {
          const data = await api(`/productConfigAgent/extractions/${state.documentId}/reextract`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          state.dictionary = data.dictionary;
          renderSummary(data.dictionary?.summary);
          renderItems(data.items);
          $("warnings").textContent = JSON.stringify(data.warnings || [], null, 2);
          await Promise.all([refreshCandidates(), refreshDocuments()]);
          setStatus(
            `重新 LLM 解析完成：document #${state.documentId} · blocks ${data.reusedBlocks ? "已复用" : "已重建"}`,
          );
        } finally {
          $("reextractCurrentDocument").disabled = false;
        }
      }

      async function renormalizeCurrentDocument() {
        if (!state.documentId) {
          throw new Error("请先从左侧选择一个 document");
        }
        $("renormalizeCurrentDocument").disabled = true;
        setStatus(`正在按当前字典重归一化 document #${state.documentId}...`);
        try {
          const data = await api(`/productConfigAgent/contracts/${state.documentId}/candidates/generate`, {
            method: "POST",
          });
          state.dictionary = data.dictionary;
          renderSummary(data.dictionary?.summary);
          renderItems(data.dictionary?.items);
          $("warnings").textContent = JSON.stringify(data.dictionary?.warnings || [], null, 2);
          await Promise.all([refreshCandidates(), refreshDocuments()]);
          setStatus(`重归一化完成：document #${state.documentId}`);
        } finally {
          $("renormalizeCurrentDocument").disabled = false;
        }
      }

      async function uploadFile(file) {
        const form = new FormData();
        form.append("file", file);
        setStatus("上传并抽取中...");
        const data = await api("/productConfigAgent/contracts/upload", {
          method: "POST",
          body: form,
        });
        state.documentId = data.document?.id;
        renderSummary(data.dictionary);
        renderItems(data.items);
        $("warnings").textContent = JSON.stringify(data.warnings || [], null, 2);
        await refreshCandidates();
        await refreshDocuments();
        setStatus(`处理完成：document #${state.documentId}`);
      }

      $("fileInput").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) uploadFile(file).catch((error) => setStatus(error.message));
      });
      $("refreshCandidates").addEventListener("click", () =>
        refreshCandidates().catch((error) => setStatus(error.message)),
      );
      $("generateSuggestions").addEventListener("click", () =>
        generateBatchSuggestions().catch((error) => setStatus(error.message)),
      );
      $("submitSelectedCandidateReviews").addEventListener("click", () =>
        submitSelectedCandidateReviews().catch((error) => setStatus(error.message)),
      );
      $("startPendingLlmUpload").addEventListener("click", () =>
        startPendingLlmUpload().catch((error) => setStatus(error.message)),
      );
      $("startDirtyDataRefresh").addEventListener("click", () =>
        startDirtyDataRefresh().catch((error) => setStatus(error.message)),
      );
      $("reextractCurrentDocument").addEventListener("click", () =>
        reextractCurrentDocument().catch((error) => setStatus(error.message)),
      );
      $("renormalizeCurrentDocument").addEventListener("click", () =>
        renormalizeCurrentDocument().catch((error) => setStatus(error.message)),
      );
      $("fieldDetailClose").addEventListener("click", () => {
        $("fieldDetailToast").hidden = true;
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          $("fieldDetailToast").hidden = true;
        }
      });
      $("manualSuggestionClose").addEventListener("click", () => {
        $("manualSuggestionModal").hidden = true;
      });
      $("manualSuggestionModal").addEventListener("click", (event) => {
        if (event.target.id === "manualSuggestionModal") {
          $("manualSuggestionModal").hidden = true;
        }
      });
      $("copySuggestionPrompt").addEventListener("click", async () => {
        const text = $("suggestionPromptText").value;
        try {
          await navigator.clipboard.writeText(text);
          setStatus("Prompt 已复制。");
        } catch {
          $("suggestionPromptText").select();
          document.execCommand("copy");
          setStatus("Prompt 已复制。");
        }
      });
      $("applySuggestionJson").addEventListener("click", () => {
        try {
          saveSuggestionDraft();
          const data = parseJsonLoose($("suggestionResponseText").value);
          applyManualReviewSuggestions(data);
          $("manualSuggestionModal").hidden = true;
        } catch (error) {
          setStatus(error.message);
        }
      });
      $("suggestionResponseText").addEventListener("input", saveSuggestionDraft);
      $("candidateStatus").addEventListener("change", () =>
        refreshCandidates().catch((error) => setStatus(error.message)),
      );
      $("showGlobalCandidates").addEventListener("change", (event) => {
        state.showGlobalCandidates = event.target.checked;
        refreshCandidates().catch((error) => setStatus(error.message));
      });
      $("documentStatusFilter").addEventListener("change", () => {
        state.documentPage = 1;
        refreshDocuments().catch((error) => setStatus(error.message));
      });
      $("documentSearch").addEventListener("input", () => {
        clearTimeout(state.documentSearchTimer);
        state.documentSearchTimer = setTimeout(() => {
          state.documentPage = 1;
          refreshDocuments().catch((error) => setStatus(error.message));
        }, 250);
      });
      $("prevDocumentPage").addEventListener("click", () => {
        if (state.documentPage <= 1) return;
        state.documentPage -= 1;
        refreshDocuments().catch((error) => setStatus(error.message));
      });
      $("nextDocumentPage").addEventListener("click", () => {
        if (state.documentPage * state.documentPageSize >= state.documentTotal) return;
        state.documentPage += 1;
        refreshDocuments().catch((error) => setStatus(error.message));
      });
      $("termTypePickerClose").addEventListener("click", closeTermTypePicker);
      $("termTypePicker").addEventListener("click", (event) => {
        if (event.target === $("termTypePicker")) {
          closeTermTypePicker();
        }
      });
      $("termTypePickerSearch").addEventListener("input", (event) => {
        renderTermTypePickerResults(event.target.value);
      });

      const drop = $("drop");
      drop.addEventListener("dragover", (event) => {
        event.preventDefault();
        drop.classList.add("drag");
      });
      drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
      drop.addEventListener("drop", (event) => {
        event.preventDefault();
        drop.classList.remove("drag");
        const file = event.dataTransfer.files?.[0];
        if (file) uploadFile(file).catch((error) => setStatus(error.message));
      });

      loadSuggestionDraft();
      Promise.all([refreshCandidates(), refreshDocuments()]).catch((error) =>
        setStatus(error.message),
      );
    </script>
  </body>
</html>
