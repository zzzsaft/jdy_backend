<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quote Agent Dictionary Review</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #b45309;
        --bad: #b42318;
        --good: #027a48;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }
      main {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 18px;
        padding: 18px;
      }
      section,
      aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      aside {
        padding: 16px;
        height: calc(100vh - 92px);
        overflow: auto;
      }
      .content {
        display: grid;
        gap: 18px;
      }
      .drop {
        display: grid;
        place-items: center;
        min-height: 180px;
        border: 1px dashed #98a2b3;
        border-radius: 8px;
        background: #fbfcfe;
        text-align: center;
        cursor: pointer;
      }
      .drop.drag {
        border-color: var(--accent);
        background: #eefaf8;
      }
      .drop input {
        display: none;
      }
      .status {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        min-height: 20px;
      }
      .toolbar,
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      button,
      input,
      select,
      textarea {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
        min-height: 34px;
      }
      input,
      select,
      textarea {
        padding: 7px 9px;
        width: 100%;
      }
      button {
        padding: 7px 10px;
        cursor: pointer;
        white-space: nowrap;
        width: fit-content;
        max-width: 100%;
        align-self: start;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      button.primary:hover {
        background: var(--accent-strong);
      }
      button.link-chip {
        min-height: auto;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        white-space: normal;
      }
      .field-detail-trigger {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px;
        border-radius: 6px;
      }
      .field-detail-trigger:hover {
        background: #f2f4f7;
      }
      button.danger {
        color: var(--bad);
      }
      .panel {
        padding: 16px;
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
      }
      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
      }
      .metric b {
        display: block;
        font-size: 20px;
      }
      .metric span,
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .document-search {
        display: grid;
        gap: 8px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }
      .document-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }
      .document-row {
        display: grid;
        gap: 4px;
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        text-align: left;
      }
      .document-row.active {
        border-color: var(--accent);
        background: #eefaf8;
      }
      .item,
      .candidate {
        border-top: 1px solid var(--line);
        padding: 12px 0;
      }
      .item:first-child,
      .candidate:first-child {
        border-top: 0;
      }
      .field {
        display: grid;
        grid-template-columns: minmax(140px, 1fr) minmax(160px, 1fr) 120px;
        gap: 8px;
        padding: 7px 0;
        border-top: 1px solid #eef1f5;
        font-size: 13px;
      }
      .field:first-child {
        border-top: 0;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        background: #eef2f6;
        color: #344054;
      }
      .tag.good {
        background: #ecfdf3;
        color: var(--good);
      }
      .tag.warn {
        background: #fffaeb;
        color: var(--warn);
      }
      .tag.bad {
        background: #fef3f2;
        color: var(--bad);
      }
      .tag.enums {
        background: #eff6ff;
        color: #1e40af;
      }
      .detail-toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        width: min(560px, calc(100vw - 36px));
        max-height: min(720px, calc(100vh - 36px));
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(16, 24, 40, 0.18);
        z-index: 30;
      }
      .detail-toast[hidden] {
        display: none;
      }
      .detail-toast-head {
        position: sticky;
        top: 0;
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }
      .detail-toast-body {
        padding: 12px 14px 14px;
        display: grid;
        gap: 10px;
      }
      .detail-block {
        display: grid;
        gap: 6px;
      }
      .detail-block pre {
        margin: 0;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #eef1f5;
        border-radius: 6px;
        padding: 8px;
        background: #fbfcfe;
        font-size: 12px;
      }
      .product-checks {
       grid-column: 1 / -1;
       display: flex;
       flex-wrap: wrap;
       gap: 8px;
     }
      .product-checks label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
      }
      .product-checks input {
        width: auto;
        min-height: auto;
      }
      .candidate form {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr)) auto;
        gap: 8px;
        margin-top: 8px;
        align-items: start;
      }
      .candidate form > button {
        min-width: 96px;
        justify-self: start;
      }
      .candidate .full {
        grid-column: 1 / -1;
      }
      .review-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .review-actions button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .review-suggestion {
        display: grid;
        gap: 6px;
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #b7dfd9;
        border-radius: 8px;
        background: #f0faf8;
      }
      .review-suggestion-head {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .review-suggestion p {
        margin: 0;
        color: #344054;
        font-size: 12px;
        line-height: 1.45;
      }
      .prompt-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .prompt-grid textarea {
        min-height: 420px;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
        font-size: 12px;
        line-height: 1.45;
      }
      .review-form[hidden] {
        display: none;
      }
      .hint {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .form-title {
        grid-column: 1 / -1;
        color: #344054;
        font-size: 13px;
        font-weight: 700;
      }
      .field-label {
        display: grid;
        gap: 4px;
        color: #344054;
        font-size: 12px;
        font-weight: 700;
      }
      .field-label input,
      .field-label select {
        font-weight: 400;
      }
      .alias-list {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .alias-list label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
      }
      .alias-list input {
        width: auto;
        min-height: auto;
      }
      .suggest-progress {
        grid-column: 1 / -1;
        display: grid;
        gap: 6px;
        margin: 8px 0 4px;
      }
      .suggest-progress-track {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #eef2f6;
      }
      .suggest-progress-bar {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: var(--accent);
        transition: width 0.2s ease;
      }
      .term-preview {
        grid-column: 1 / -1;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfcfe;
      }
      .term-preview-values {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .candidate-documents {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }
      .candidate-documents button {
        min-height: 32px;
        padding: 6px 10px;
      }
      .enum-value-inputs {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr)) auto;
        gap: 8px;
        align-items: start;
      }
      .enum-value-inputs[hidden] {
        display: none;
      }
      .value-rows {
        grid-column: 1 / -1;
        display: grid;
        gap: 8px;
      }
      .value-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr)) auto;
        gap: 8px;
        align-items: end;
      }
      .value-row button {
        min-height: 46px;
      }
      .split-rows {
        display: grid;
        gap: 10px;
      }
      .split-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr));
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
      }
      .picker-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: start center;
        padding: 76px 18px 18px;
        background: rgba(16, 24, 40, 0.18);
      }
      .picker-backdrop[hidden] {
        display: none;
      }
      .picker-panel {
        width: min(760px, 100%);
        max-height: min(680px, calc(100vh - 110px));
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(16, 24, 40, 0.22);
      }
      .picker-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }
      .picker-results {
        max-height: 520px;
        overflow: auto;
        padding: 6px;
      }
      .picker-item {
        display: grid;
        gap: 4px;
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        text-align: left;
      }
      .picker-item:hover {
        background: #f2f6fb;
      }
      .picker-item b {
        font-size: 14px;
      }
      .prompt-backdrop {
        position: fixed;
        inset: 0;
        z-index: 45;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(16, 24, 40, 0.28);
      }
      .prompt-backdrop[hidden] {
        display: none;
      }
      .prompt-modal {
        width: min(1180px, 100%);
        max-height: min(860px, calc(100vh - 40px));
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
        box-shadow: 0 18px 48px rgba(16, 24, 40, 0.22);
      }
      .prompt-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .job-status {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
        aside {
          height: auto;
        }
        .field,
        .candidate form,
        .prompt-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Quote Agent 字典审核</h1>
      <div class="toolbar">
        <select id="candidateStatus">
          <option value="pending">待审核</option>
          <option value="approved">已通过</option>
          <option value="rejected">已拒绝</option>
        </select>
        <button id="refreshCandidates">刷新候选</button>
        <button id="generateSuggestions" class="primary">生成 DeepSeek Prompt</button>
        <button id="startPendingLlmUpload" type="button">上传未提取 documents 到 LLM</button>
        <button id="startDirtyDataRefresh" type="button">后台更新脏数据</button>
      </div>
    </header>
    <main>
      <aside>
        <label class="drop" id="drop">
          <input id="fileInput" type="file" />
          <span>
            拖拽文件到这里<br />
            <span class="muted">或点击选择合同/生产明细文件</span>
          </span>
        </label>
        <div class="status" id="status"></div>
        <div class="job-status" id="pendingLlmUploadStatus">LLM 批处理未启动。</div>
        <div class="job-status" id="dirtyDataRefreshStatus">脏数据更新未启动。</div>
        <div class="document-search">
          <b>解析任务</b>
          <input id="documentSearch" placeholder="搜索文件名" />
          <select id="documentStatusFilter">
            <option value="">全部状态</option>
            <option value="uploaded">uploaded</option>
            <option value="parsed_blocks">parsed_blocks</option>
            <option value="planned">planned</option>
            <option value="planned_partial">planned_partial</option>
            <option value="extracted">extracted</option>
            <option value="normalized">normalized</option>
            <option value="dictionary_dirty">dictionary_dirty</option>
            <option value="failed">failed</option>
          </select>
          <div class="toolbar">
            <button id="prevDocumentPage" type="button">上一页</button>
            <button id="nextDocumentPage" type="button">下一页</button>
          </div>
          <div id="documentPager" class="muted"></div>
          <div id="documentList" class="document-list muted">暂无数据。</div>
        </div>
        <div id="summary"></div>
      </aside>
      <div class="content">
        <section class="panel">
          <div class="row" style="justify-content: space-between; margin-bottom: 12px">
            <h2 style="margin: 0">字典匹配结果</h2>
            <div class="toolbar">
              <button id="renormalizeCurrentDocument" type="button">按当前字典重归一化</button>
              <button id="reextractCurrentDocument" type="button">重新 LLM 解析当前 document</button>
            </div>
          </div>
          <div id="items" class="muted">等待上传文件。</div>
        </section>
        <section class="panel">
          <div class="row" style="justify-content: space-between; margin-bottom: 12px">
            <h2 style="margin: 0">字段 Key 候选</h2>
            <label class="muted" style="display: inline-flex; align-items: center; gap: 6px">
              <input id="showGlobalCandidates" type="checkbox" style="width: auto; min-height: auto" />
              显示全局候选
            </label>
          </div>
          <div id="candidateScope" class="muted"></div>
          <div class="toolbar" style="margin: 8px 0">
            <button id="submitSelectedCandidateReviews" type="button">批量提交选中的字段 Key / 字段值审核</button>
            <span class="muted">先勾选候选卡片，再在每张卡片里选择审核动作并填表。</span>
          </div>
          <div id="termTypeCandidates" class="muted">暂无数据。</div>
        </section>
        <section class="panel">
          <h2>字段值候选</h2>
          <div id="valueCandidates" class="muted">暂无数据。</div>
        </section>
        <section class="panel">
          <h2>提醒</h2>
          <pre id="warnings" class="muted">暂无 warnings。</pre>
        </section>
      </div>
    </main>
    <div class="picker-backdrop" id="termTypePicker" hidden>
      <div class="picker-panel">
        <div class="picker-head">
          <input id="termTypePickerSearch" placeholder="搜索字段 Key、中文名、分类" />
          <button id="termTypePickerClose" type="button">关闭</button>
        </div>
        <div class="picker-results" id="termTypePickerResults"></div>
      </div>
    </div>
    <div class="prompt-backdrop" id="manualSuggestionModal" hidden>
      <div class="prompt-modal">
        <div class="prompt-head">
          <div>
            <b>DeepSeek 批量预审 Prompt</b>
            <div class="muted">复制左侧内容到 DeepSeek。把返回的纯 JSON 粘贴到右侧，再应用到当前候选。</div>
          </div>
          <button id="manualSuggestionClose" type="button">关闭</button>
        </div>
        <div class="toolbar">
          <button id="copySuggestionPrompt" class="primary" type="button">复制 Prompt</button>
          <button id="applySuggestionJson" type="button">应用 JSON</button>
        </div>
        <div class="prompt-grid" style="margin-top: 12px">
          <label class="field-label">
            发给 DeepSeek 的 Prompt
            <textarea id="suggestionPromptText" readonly></textarea>
          </label>
          <label class="field-label">
            粘贴 DeepSeek 返回 JSON
            <textarea id="suggestionResponseText" placeholder='只粘贴 JSON，例如 {"termTypeCandidateSuggestions":[],"valueCandidateSuggestions":[]}'></textarea>
          </label>
        </div>
      </div>
    </div>
    <div class="detail-toast" id="fieldDetailToast" hidden>
      <div class="detail-toast-head">
        <div>
          <b id="fieldDetailTitle">字段详情</b>
          <div class="muted" id="fieldDetailSubtitle"></div>
        </div>
        <button id="fieldDetailClose" type="button">关闭</button>
      </div>
      <div class="detail-toast-body" id="fieldDetailBody"></div>
    </div>
    <script>
      const state = {
        documentId: null,
        dictionary: null,
        termTypes: [],
        values: [],
        productTypes: [],
        documents: [],
        documentPage: 1,
        documentPageSize: 10,
        documentTotal: 0,
        currentTermTypeCandidates: [],
        currentValueCandidates: [],
        activeTermTypeInput: null,
        fieldDetails: new Map(),
        showGlobalCandidates: false,
      };
      const apiBase =
        window.location.protocol === "file:" ? "http://localhost:2001" : "";
      <!-- const pendingLlmUploadApiBase = "http://hz.jc-times.com:2000"; -->
      const pendingLlmUploadApiBase = "http://localhost:2001";
      const suggestionDraftKey = "productConfigAgent.manualSuggestionJsonDraft";
      const suggestionAppliedKey = "productConfigAgent.manualSuggestionApplied";
      const legacySuggestionDraftKey = "quoteAgent.manualSuggestionJsonDraft";
      const legacySuggestionAppliedKey = "quoteAgent.manualSuggestionApplied";
      let pendingLlmUploadTimer = null;
      let dirtyDataRefreshTimer = null;

      const $ = (id) => document.getElementById(id);

      function setStatus(text) {
        $("status").textContent = text;
      }

      async function api(path, options = {}) {
        const { apiBase: overrideApiBase, ...fetchOptions } = options;
        const response = await fetch(`${overrideApiBase ?? apiBase}${path}`, fetchOptions);
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(data?.error || data?.message || response.statusText);
        }
        return data;
      }

      function renderPendingLlmUploadJob(job) {
        if (!job) {
          $("pendingLlmUploadStatus").textContent = "LLM 批处理未启动。";
          return;
        }
        const batchProgress = job.total
          ? `${job.processed}/${job.total}`
          : `${job.processed}`;
        const currentIds = Array.isArray(job.currentDocumentIds)
          ? job.currentDocumentIds
          : job.currentDocumentId
            ? [job.currentDocumentId]
            : [];
        const current = currentIds.length
          ? ` · 当前 document ${currentIds.map((id) => `#${id}`).join(", ")}`
          : "";
        const errors = job.failedCount ? ` · 失败 ${job.failedCount}` : "";
        const streamProgress = Array.isArray(job.documentProgress)
          ? job.documentProgress
              .filter((item) => item.status === "running")
              .map(
                (item) =>
                  `#${item.documentId} ${item.contentLength || 0} chars / ${item.chunkCount || 0} chunks`,
              )
              .join("；")
          : "";
        $("pendingLlmUploadStatus").textContent =
          `LLM 批处理 ${job.status} · 并发 ${job.concurrency || 1} · 进度 ${batchProgress} · 成功 ${job.successCount}${errors}${current}${streamProgress ? ` · ${streamProgress}` : ""}`;
      }

      async function pollPendingLlmUploadStatus() {
        const data = await api("/productConfigAgent/documents/pending-llm-upload/status", {
          apiBase: pendingLlmUploadApiBase,
        });
        renderPendingLlmUploadJob(data.job);
        if (!data.job || data.job.status !== "running") {
          clearInterval(pendingLlmUploadTimer);
          pendingLlmUploadTimer = null;
        }
      }

      async function startPendingLlmUpload() {
        $("startPendingLlmUpload").disabled = true;
        setStatus("已请求服务器开始 LLM 批处理...");
        try {
          const data = await api("/productConfigAgent/documents/pending-llm-upload/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ limit: 20, concurrency: 10 }),
            apiBase: pendingLlmUploadApiBase,
          });
          renderPendingLlmUploadJob(data.job);
          if (!pendingLlmUploadTimer) {
            pendingLlmUploadTimer = setInterval(() => {
              pollPendingLlmUploadStatus().catch((error) => setStatus(error.message));
            }, 3000);
          }
          setStatus(`LLM 批处理已启动：job #${data.job?.id || "-"}`);
        } finally {
          $("startPendingLlmUpload").disabled = false;
        }
      }

      function renderDirtyDataRefreshJob(job) {
        if (!job) {
          $("dirtyDataRefreshStatus").textContent = "脏数据更新未启动。";
          return;
        }
        const progress = job.total ? `${job.processed}/${job.total}` : `${job.processed}`;
        const current = job.currentDocumentId
          ? ` · 当前 document #${job.currentDocumentId}`
          : "";
        const errors = job.failedCount ? ` · 失败 ${job.failedCount}` : "";
        $("dirtyDataRefreshStatus").textContent =
          `脏数据更新 ${job.status} · 进度 ${progress} · 成功 ${job.successCount || 0}${errors} · archive 更新 ${job.archiveUpdatedCount || 0} · version ${job.archiveVersionCount || 0}${current}`;
      }

      async function pollDirtyDataRefreshStatus() {
        const data = await api("/productConfigAgent/dictionary-dirty/refresh/status");
        renderDirtyDataRefreshJob(data.job);
        if (!data.job || data.job.status !== "running") {
          clearInterval(dirtyDataRefreshTimer);
          dirtyDataRefreshTimer = null;
          await refreshDocuments();
        }
      }

      async function startDirtyDataRefresh() {
        $("startDirtyDataRefresh").disabled = true;
        setStatus("已请求服务器后台更新 dirty document / archive...");
        try {
          const data = await api("/productConfigAgent/dictionary-dirty/refresh/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ limit: 200, batchSize: 10 }),
          });
          renderDirtyDataRefreshJob(data.job);
          if (!dirtyDataRefreshTimer) {
            dirtyDataRefreshTimer = setInterval(() => {
              pollDirtyDataRefreshStatus().catch((error) => setStatus(error.message));
            }, 3000);
          }
          setStatus(`脏数据后台更新已启动：job #${data.job?.id || "-"}`);
        } finally {
          $("startDirtyDataRefresh").disabled = false;
        }
      }

      function renderSummary(summary) {
        if (!summary) {
          $("summary").innerHTML = "";
          return;
        }
        const labels = [
          ["item_count", "条目"],
          ["raw_field_count", "原始字段"],
          ["dictionary_matched_count", "已匹配"],
          ["term_type_candidate_count", "字段 Key 候选"],
          ["value_candidate_count", "字段值候选"],
          ["warning_count", "提醒"],
        ];
        $("summary").innerHTML =
          '<div class="summary">' +
          labels
            .map(
              ([key, label]) =>
                `<div class="metric"><b>${summary[key] ?? 0}</b><span>${label}</span></div>`,
            )
            .join("") +
          "</div>";
      }

      function productTypeLabel(value) {
        if (!value) return "";
        if (value === "common") return "通用";
        if (value === "unknown") return "unknown";
        const item = state.productTypes.find((option) => option.canonicalValue === value);
        return item ? item.displayName : value;
      }

      function productTypeTags(values = []) {
        const list = Array.isArray(values) ? values : [];
        if (!list.length) return '<span class="muted">历史兼容全部</span>';
        return list
          .map((value) => `<span class="tag">${escapeHtml(productTypeLabel(value))}</span>`)
          .join(" ");
      }

      function renderProductTypeChecks(selected = []) {
        const selectedSet = new Set(selected);
        const options = [
          { canonicalValue: "common", displayName: "通用" },
          ...state.productTypes,
        ];
        return `
          <div class="product-checks">
            ${options
              .map(
                (option) => `
                  <label>
                    <input type="checkbox" name="applicableProductTypes" value="${escapeHtml(option.canonicalValue)}" ${selectedSet.has(option.canonicalValue) ? "checked" : ""}>
                    ${escapeHtml(option.displayName)}
                  </label>
                `,
              )
              .join("")}
          </div>
        `;
      }

      function candidateTag(field) {
        if (!field.candidate) return "";
        const type =
          field.candidate.candidate_type === "term_type"
            ? "字段 Key 候选"
            : "字段值候选";
        return `<span class="tag warn">${type} #${field.candidate.candidate_id}</span>`;
      }

      function renderFieldStatus(field) {
        if (field.dictionary?.matched) {
          return '<span class="tag good">已匹配</span>';
        }
        if (field.candidate) {
          return '<span class="tag warn">待审核</span>';
        }
        const warningTypes = new Set((field.warnings || []).map((warning) => warning.type));
        if (
          warningTypes.has("empty_value") ||
          warningTypes.has("unknown_value") ||
          warningTypes.has("split_original_retained") ||
          warningTypes.has("term_type_candidate_previously_rejected") ||
          warningTypes.has("value_candidate_previously_rejected")
        ) {
          return warningTypes.has("split_original_retained")
            ? '<span class="tag">已拆分</span>'
            : '<span class="tag">已跳过</span>';
        }
        return '<span class="tag warn">未匹配</span>';
      }

      function renderDictionaryValue(field) {
        const dictionary = field.dictionary || {};
        const values = Array.isArray(dictionary.values) ? dictionary.values : [];
        if (values.length) {
          return values
            .map((value) => {
              const label = value.display_name || value.displayName || value.canonical_value || value.canonicalValue || value.raw_value || value.rawValue || "";
              return `<span class="tag">${escapeHtml(label)}</span>`;
            })
            .join("");
        }
        return `<span class="muted">${escapeHtml(dictionary.canonical_value || dictionary.display_name || "")}</span>`;
      }

      function compactJson(value) {
        return escapeHtml(JSON.stringify(value ?? null, null, 2));
      }

      function showFieldDetailToast(detailId) {
        const detail = state.fieldDetails.get(detailId);
        if (!detail) return;
        $("fieldDetailTitle").textContent = `${detail.field.field_name || "字段"} · ${detail.field.raw_value || ""}`;
        $("fieldDetailSubtitle").textContent =
          `item #${detail.item.item_index} · ${productTypeLabel(detail.item.itemProductTypeHint || "unknown")} · ${detail.field.dictionary?.term_type || detail.field.dictionary?.normalized_field_name || "未匹配字段"}`;
        $("fieldDetailBody").innerHTML = `
          <div class="detail-block">
            <b>匹配结果</b>
            <pre>${compactJson(detail.field.dictionary || {})}</pre>
          </div>
          ${
            detail.field.candidate
              ? `<div class="detail-block"><b>候选</b><pre>${compactJson(detail.field.candidate)}</pre></div>`
              : ""
          }
          ${
            (detail.field.warnings || []).length
              ? `<div class="detail-block"><b>提醒</b><pre>${compactJson(detail.field.warnings)}</pre></div>`
              : '<div class="detail-block"><b>提醒</b><span class="muted">暂无提醒。</span></div>'
          }
          ${
            detail.field.evidence
              ? `<div class="detail-block"><b>证据</b><pre>${compactJson(detail.field.evidence)}</pre></div>`
              : ""
          }
        `;
        $("fieldDetailToast").hidden = false;
      }

      function renderItems(items) {
        if (!items?.length) {
          $("items").innerHTML = '<span class="muted">暂无字段。</span>';
          return;
        }
        state.fieldDetails.clear();
        let fieldDetailIndex = 0;
        $("items").innerHTML = items
          .map(
            (item) => `
              <div class="item">
                <div class="row">
                  <b>Item #${item.item_index}</b>
                  <span>${escapeHtml(item.item_name || "")}</span>
                  ${item.item_quantity ? `<span class="tag">数量 ${escapeHtml(item.item_quantity)}</span>` : ""}
                  <span class="tag ${item.itemProductTypeHint === "unknown" ? "bad" : ""}">
                    ${escapeHtml(productTypeLabel(item.itemProductTypeHint || "unknown"))}
                  </span>
                  ${item.itemProductTypeHintConfidence ? `<span class="muted">confidence ${escapeHtml(item.itemProductTypeHintConfidence)}</span>` : ""}
                </div>
                ${item.itemProductTypeHintRawValue ? `<div class="muted">${escapeHtml(item.itemProductTypeHintRawValue)}</div>` : ""}
                ${(item.warnings || []).length ? `<pre class="muted">${escapeHtml(JSON.stringify(item.warnings, null, 2))}</pre>` : ""}
                ${(item.fields || [])
                  .map((field) => {
                    const detailId = `field-${fieldDetailIndex++}`;
                    state.fieldDetails.set(detailId, { item, field });
                    return `
                      <div class="field">
                        <div><b>${escapeHtml(field.field_name)}</b><br><span class="muted">item #${item.item_index} · ${escapeHtml(item.itemProductTypeHint || "unknown")} · ${escapeHtml(field.dictionary.term_type || field.dictionary.normalized_field_name || "")}</span></div>
                        <div>${escapeHtml(field.raw_value)}<br>${renderDictionaryValue(field)}</div>
                        <div>
                          <button class="link-chip field-detail-trigger" type="button" data-field-detail="${escapeHtml(detailId)}">

                      </div>

              </div>
            `,
          )
          .join("");
        $("items").querySelectorAll("[data-field-detail]").forEach((button) => {
          button.addEventListener("click", () => showFieldDetailToast(button.dataset.fieldDetail));
        });
      }

      function renderDocumentList() {
        $("documentPager").textContent =
          `第 ${state.documentPage} 页 · 共 ${state.documentTotal} 条`;
        $("documentList").innerHTML = state.documents.length
          ? state.documents
              .map(
                (document) => `
                  <button class="document-row ${String(document.documentId) === String(state.documentId) ? "active" : ""}" type="button" data-document-id="${escapeHtml(document.documentId)}">
                    <b>${escapeHtml(document.fileName || `document #${document.documentId}`)}</b>
                    <span class="muted">document #${escapeHtml(document.documentId)} · extraction #${escapeHtml(document.extractionJobId || "-")}</span>
                    <span>
                      <span class="tag">${escapeHtml(document.status || "-")}</span>
                      <span class="tag">item ${escapeHtml(document.itemCount || 0)}</span>
                      <span class="tag ${document.warningCount ? "warn" : ""}">warning ${escapeHtml(document.warningCount || 0)}</span>
                      <span class="tag ${document.candidateCount ? "warn" : ""}">candidate ${escapeHtml(document.candidateCount || 0)}</span>
                    </span>
                  </button>
                `,
              )
              .join("")
          : '<span class="muted">暂无解析任务。</span>';
        $("documentList").querySelectorAll("[data-document-id]").forEach((button) => {
          button.addEventListener("click", async () => {
            state.documentId = button.dataset.documentId;
            await Promise.all([refreshContract(), refreshCandidates()]);
            renderDocumentList();
          });
        });
      }

      async function refreshDocuments() {
        const params = new URLSearchParams({
          page: String(state.documentPage),
          pageSize: String(state.documentPageSize),
        });
        const status = $("documentStatusFilter").value;
        const q = $("documentSearch").value.trim();
        if (status) params.set("status", status);
        if (q) params.set("q", q);
        const data = await api(`/productConfigAgent/extractions?${params.toString()}`);
        state.documents = data.items || [];
        state.documentTotal = data.total || 0;
        state.documentPage = data.page || state.documentPage;
        state.documentPageSize = data.pageSize || state.documentPageSize;
        renderDocumentList();
      }

      function bodyFromForm(form) {
        const body = {};
        for (const [key, value] of new FormData(form).entries()) {
          if (value === "") continue;
          if (
            key === "aliasNames" ||
            key === "valueAliasNames" ||
            key === "applicableProductTypes"
          ) {
            body[key] = body[key] || [];
            body[key].push(value);
          } else {
            body[key] = value;
          }
        }
        for (const key of ["aliasNamesManual", "valueAliasNamesManual"]) {
          if (!body[key]) continue;
          const targetKey =
            key === "aliasNamesManual" ? "aliasNames" : "valueAliasNames";
          body[targetKey] = body[targetKey] || [];
          String(body[key])
            .split(/[,\n，、]/)
            .map((item) => item.trim())
            .filter(Boolean)
            .forEach((item) => body[targetKey].push(item));
          delete body[key];
        }
        if (body.valueCanonicalValue && !body.valueDisplayName) {
          body.valueDisplayName = body.valueCanonicalValue;
        }
        if (body.canonicalValue && !body.displayName) {
          body.displayName = body.canonicalValue;
        }
        return body;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function suggestFieldKey(candidate) {
        const base = String(candidate.proposedTermType || candidate.rawFieldName || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
        return base || `field_${candidate.id}`;
      }

      function termTypeOptions(selected = "") {
        const options = ['<option value="">选择已有字段 Key</option>'];
        for (const item of state.termTypes) {
          const label = `${item.displayName || item.termType} / ${item.termType}`;
          options.push(
            `<option value="${escapeHtml(item.termType)}" ${item.termType === selected ? "selected" : ""}>${escapeHtml(label)}</option>`,
          );
        }
        return options.join("");
      }

      function valueOptions(termType, selected = "") {
        const values = state.values.filter((item) => item.termType === termType);
        const options = ['<option value="">选择已有字段值</option>'];
        for (const item of values) {
          const label = `${item.displayName || item.canonicalValue} / ${item.canonicalValue} (#${item.id})`;
          options.push(
            `<option value="${escapeHtml(item.id)}" ${item.id === selected ? "selected" : ""}>${escapeHtml(label)}</option>`,
          );
        }
        return options.join("");
      }

      function valueKindOptions(selected = "enum", includeEmpty = false) {
        const kinds = [
          ["enum", "枚举"],
          ["enums", "枚举（多值）"],
          ["number", "数字"],
          ["number_unit", "数字+单位"],
          ["text", "文本"],
          ["boolean", "是否"],
          ["date", "日期"],
          ["number_or_boolean", "数字或是否"],
        ];
        return [
          includeEmpty ? '<option value="">字段值类型不变</option>' : "",
          ...kinds.map(
            ([value, label]) =>
              `<option value="${value}" ${value === selected ? "selected" : ""}>${label} (${value})</option>`,
          ),
        ].join("");
      }

      const actionLabels = {
        create_term_type: "新增字段 Key",
        approve_as_alias: "归属已有 alias",
        split_term_type: "拆分字段 Key",
        create_value: "新增标准字段值",
        move_to_other_term_type: "移动到其他字段 Key",
        split_value: "拆分字段值",
        reject: "拒绝",
        needs_human_review: "人工复核",
      };

      const deepSeekReviewInstructions = `你是 productConfigAgent 字典候选批量预审助手。

只输出合法 JSON，不要 Markdown，不要解释，不要代码块。输出必须能被 JSON.parse 解析。

输入包含：

* productTypes：正式产品类型字典，来自 term_type = product_type 的 dictionary_terms，含 canonicalValue、displayName。
* termTypes：现有字段 Key 列表，含 termType、displayName、quoteDisplayName、valueKind、category、aliases、applicableProductTypes。
* enumValues：仅 enum 字段下已有标准值摘要，含 termId、termType、canonicalValue、displayName、aliases。
* termTypeCandidates：字段 Key 候选。
* valueCandidates：字段值候选。

产品类型规则：

1. productTypes 是正式产品类型字典，仅用于理解 sourceProductType 和 applicableProductTypes。
2. sourceProductType 表示候选来源 item 的产品类型，由 extraction 的 product_type_hint / itemProductTypeHint 得到。
3. sourceProductType 不是字段 Key，不是 termType，不要创建 product_type_hint 之类的 termType。
4. sourceProductType 只能作为候选审核上下文，用于判断字段是否适用于当前产品。
5. product_type 是正式字典字段，product_type_hint / item_type_hint 不是正式字典字段。
6. applicableProductTypes 表示某个 termType 适用的产品类型，取值应来自 productTypes 的 canonicalValue，或 common。
7. common 表示通用字段，适用于所有产品。
8. 如果 applicableProductTypes 为空、缺失或 null，视为历史兼容字段，不要仅因此拒绝匹配，但 reason 中可以提示需要补充适用产品类型。
9. 如果候选来自 sourceProductType = metering_pump，优先匹配 applicableProductTypes 包含 metering_pump 或 common 的 termType。
10. 如果候选来自 sourceProductType = filter，优先匹配 applicableProductTypes 包含 filter 或 common 的 termType。
11. 如果候选来自 sourceProductType = flat_die，优先匹配 applicableProductTypes 包含 flat_die 或 common 的 termType。
12. 如果目标 termType 的 applicableProductTypes 明显不包含 sourceProductType，也不包含 common，不要直接高置信 approve；应返回 needs_human_review，或在允许的情况下提示需要追加 applicableProductTypes。
13. 不要把具体型号、规格、压力、排量、尺寸等做成 product_type 或 enum value。
14. 不要把“双柱换网器 / 高压过滤器 / 10ccm / 25MPa”等价格敏感信息压扁成 product_type。
15. 子类型、结构类型可以作为独立 termType，例如 filter_structure_type、metering_pump_series、hydraulic_station_type，但具体型号应为 text 字段。

正式 product_type 常见取值包括：

* flat_die：平模头
* filter：过滤器 / 换网器
* metering_pump：计量泵
* feedblock：分配器
* die_cart：模具小车
* hydraulic_station：液压站
* melt_pipe：熔体管道 / 连接器 / 联结器 / 联接器
* blown_film_die：吹膜模头 / 圆模
* coating_die：涂布模头
* unknown：未知

重要规则：

1. termTypeCandidates 是“字段 Key 候选”，只用于判断 rawFieldName 应该如何处理。

   * 判断依据主要是 rawFieldName / normalizedFieldName。
   * sourceProductType / itemIndex / itemName / rawValue 只能作为上下文辅助。
   * rawValue 不能作为主要依据；不能因为 rawValue 匹配某个 enum value 就把 termType candidate 审核为 value alias。
   * 如果 rawFieldName 本身是复合字段名，例如“电压及加热功率”“长宽高”“压力及排量”，应返回 split_term_type，并在 splits 中给出拆分后的字段 Key 和对应值；不要返回 split_value。
   * approve_as_alias 必须填写 targetTermType 和 targetTermTypeDisplayName。
   * approve_as_alias 的 suggestedAliases 应包含 rawFieldName 或其合理别名。
   * termTypeCandidateSuggestions 中不要输出 suggestedValues，除非 recommendedAction 是 create_term_type 且 suggestedValueKind 是 enum 或 enums。
   * 如果 recommendedAction = create_term_type，必须填写 suggestedApplicableProductTypes。
   * 如果候选来自明确 sourceProductType，create_term_type 的 suggestedApplicableProductTypes 默认应包含 sourceProductType。
   * 如果字段明显是通用字段，例如数量、备注、单位、产品名称、交货说明，suggestedApplicableProductTypes 可以为 ["common"]。
   * 如果字段适用于多个产品，suggestedApplicableProductTypes 可以包含多个 product_type，例如 ["flat_die", "coating_die", "blown_film_die"]。
   * 如果 approve_as_alias 的目标 termType 不适用于 sourceProductType，应设置 targetTermTypeApplicableMismatch = true，并在 suggestedApplicableProductTypesToAdd 中给出建议追加的产品类型；如果风险较高，recommendedAction 应改为 needs_human_review。

2. valueCandidates 是“字段值候选”，只用于判断 rawValue 应该如何处理。

   * approve_as_alias 必须填写 targetTermId、targetCanonicalValue、targetDisplayName。
   * create_value 必须填写 canonicalValue、displayName、suggestedAliases。
   * 如果 rawValue 语义明显不属于当前 termType，返回 move_to_other_term_type。
   * 如果 rawValue 包含多个配置项，返回 split_value。
   * valueCandidate 的 sourceProductType 只能用于判断当前 termType 是否适用于该产品，不能把 sourceProductType 当成 value。
   * 如果当前 termType 的 applicableProductTypes 不包含 sourceProductType，也不包含 common，应优先 needs_human_review 或 move_to_other_term_type，不要强行 approve_as_alias。
   * 如果 rawValue 是具体型号、压力、排量、尺寸、客户备注，一般不要 create_value；应 reject、move_to_other_term_type 或 needs_human_review，具体取决于字段类型。

3. 只有 value_kind = enum 的字段值才需要 dictionary value alias。

   * number、number_unit、boolean、text、date、number_or_boolean 不应创建 value alias。
   * 这些字段值应直接解析或保留原文。
   * 如果 valueCandidate.termType 的 valueKind 不是 enum，通常不要 create_value 或 approve_as_alias。
   * 如果非 enum 字段值被送入 valueCandidates，应优先 reject 或 needs_human_review，reason 说明该字段不是 enum，不需要字典值 alias。

4. 对不确定、证据不足、字段含义模糊、产品类型不匹配、可能影响报价但无法判断的候选，返回 needs_human_review，不要强行推荐。

5. key/value 错配检测：

   如果 valueCandidate.termType 对应字段含义与 rawValue 语义明显不一致，不要把 rawValue 塞进当前 termType。

   例如：
   termType=upper_lip_adjustment_method，rawValue=模唇厚度调节范围（0.8mm）

   应返回：
   recommendedAction=move_to_other_term_type
   targetTermType=lip_thickness_adjustment_range
   movedRawValue=0.8mm
   reason=字段值表达的是厚度调节范围，不是上模唇调节方式。

6. 产品错配检测：

   如果候选来源产品类型与字段含义明显不一致，不要直接 approve。

   例如：
   sourceProductType=flat_die，rawFieldName=排量，rawValue=10ccm

   如果现有 termType 中 metering_pump_displacement 适用于 metering_pump，则应返回：
   recommendedAction=needs_human_review 或 move_to_other_term_type
   reason=候选来自平模头 item，但“排量/10ccm”更像计量泵字段，存在产品归属错配。

   例如：
   sourceProductType=metering_pump，rawFieldName=模唇调节方式

   如果模唇调节方式仅适用于 flat_die / coating_die / blown_film_die，则应返回 needs_human_review，reason 说明字段来自计量泵 item 但字段语义属于模头类产品，可能是 item 拆分或字段归属错误。

7. 过滤器 / 换网器相关规则：

   * product_type = filter 只表示一级产品类型。
   * 双柱换网器、高压过滤器、液压换网器、连续换网器、板式换网器、柱塞式换网器等不应作为 product_type 的普通 enum value。
   * 这些应优先归入 filter_structure_type / filter_drive_method 等二级字段。
   * 如果 rawValue = 双柱液压换网器，应考虑 split_value：

     * filter_structure_type：双柱换网器
     * filter_drive_method：液压
   * 如果当前没有合适 termType，应 create_term_type，而不是把它压扁成 product_type=filter。

8. 计量泵相关规则：

   * 计量泵具体型号不应做 enum。
   * 排量、压差、出口压力应为 number_unit。
   * 计量泵系列/结构如果稳定有限，可以是 enum，例如 metering_pump_series。
   * 10ccm、25MPa、37MPa 等不应 create_value。

9. 液压站相关规则：

   * 液压站具体型号不应做 enum。
   * 功率、压力、油箱容量应为 number_unit。
   * 液压站类型如果稳定有限，可以是 enum，例如 hydraulic_station_type。
   * 不要把“液压”单独错误归入 product_type。

强制字段要求：

  * targetTermTypeApplicableMismatch 默认 false。

  * split_value：每个 split 的 termType 应优先选择适用于 sourceProductType 或 common 的字段。
  * reject：reason 必须说明为什么应拒绝。

      function confidenceLabel(value) {
        const number = Number(value);
        return Number.isFinite(number) ? `${Math.round(number * 100)}%` : "未知";
      }

      function renderReviewSuggestion(candidate) {
        const suggestion = candidate.reviewSuggestion;
        if (!suggestion) {
          return '<div class="review-suggestion muted">暂无模型预审建议。</div>';
        }

        const action = actionLabels[suggestion.recommendedAction] || suggestion.recommendedAction;
        const suggestedApplicable = productTypeTags(
          suggestion.suggestedApplicableProductTypes || [],
        );
        const suggestedToAdd = productTypeTags(
          suggestion.suggestedApplicableProductTypesToAdd || [],
        );
        const productContext =
          suggestion.sourceProductType || candidate.sourceProductType
            ? `<span class="tag">来源 ${escapeHtml(productTypeLabel(suggestion.sourceProductType || candidate.sourceProductType || "unknown"))}</span>`
            : "";
        const mismatchHint = suggestion.targetTermTypeApplicableMismatch
          ? `<div class="hint full">模型提示：目标字段当前适用产品类型可能不包含来源产品；建议人工确认后再追加 ${
              (suggestion.suggestedApplicableProductTypesToAdd || []).length
                ? suggestedToAdd
                : "相应产品类型"
            }。</div>`
          : "";
        const createApplicableHint =
          (suggestion.suggestedApplicableProductTypes || []).length > 0
            ? `<div class="hint full">建议适用产品类型：${suggestedApplicable}</div>`
            : "";
        return `
          <div class="review-suggestion" data-has-review-suggestion="true">
            <div class="review-suggestion-head">
              <span class="tag good">模型建议：${escapeHtml(action)}</span>
              <span class="tag">置信度 ${escapeHtml(confidenceLabel(suggestion.confidence))}</span>
              ${productContext}
              <button type="button" data-apply-suggestion>采用推荐</button>
            </div>
            <p>${escapeHtml(suggestion.reason || "")}</p>
            ${createApplicableHint}
            ${mismatchHint}
          </div>
        `;
      }

      function candidateBelongsToDocument(candidate, documentId) {
        if (!documentId) return true;
        const targetId = String(documentId);
        if (candidate.documentId && String(candidate.documentId) === targetId) {
          return true;
        }
        if (
          candidate.latestOccurrence?.documentId &&
          String(candidate.latestOccurrence.documentId) === targetId
        ) {
          return true;
        }
        return (candidate.relatedDocuments || []).some(
          (document) => String(document.id) === targetId,
        );
      }

      function candidatesForPrompt() {
        const filterByDocument = (items) =>
          state.documentId
            ? items.filter((item) => candidateBelongsToDocument(item, state.documentId))
            : items;
        return {
          termTypeCandidates: filterByDocument(state.currentTermTypeCandidates || []),
          valueCandidates: filterByDocument(state.currentValueCandidates || []),
        };
      }

      function buildDeepSeekReviewPrompt() {
        const scopedCandidates = candidatesForPrompt();
        const termTypes = state.termTypes.map((item) => ({
          termType: item.termType,
          displayName: item.displayName,
          quoteDisplayName: item.quoteDisplayName,
          category: item.category,
          valueKind: item.valueKind,
          applicableProductTypes: item.applicableProductTypes || [],
        }));
        const enumTermTypes = new Set(
          state.termTypes
            .filter((item) => item.valueKind === "enum" || item.valueKind === "enums")
            .map((item) => item.termType),
        );
        const candidateEnumTermTypes = new Set(
          [
            ...scopedCandidates.valueCandidates.map((item) => item.termType),
            ...scopedCandidates.termTypeCandidates.map((item) => item.proposedTermType),
          ].filter((termType) => enumTermTypes.has(termType)),
        );
        const enumValues = state.values
          .filter((item) => candidateEnumTermTypes.has(item.termType))
          .map((item) => ({
            termType: item.termType,
            termId: String(item.id),
            canonicalValue: item.canonicalValue,
            displayName: item.displayName,
          }));
        const termTypeCandidates = scopedCandidates.termTypeCandidates.map((item) => ({
          candidateId: String(item.id),
          rawFieldName: item.rawFieldName,
          normalizedFieldName: item.normalizedFieldName,
          rawValue: item.rawValue,
          sourceProductType: item.sourceProductType || "unknown",
          itemIndex: item.itemIndex || item.latestOccurrence?.itemIndex || null,
          itemName: item.itemName || item.latestOccurrence?.itemName || null,
          proposedTermType: item.proposedTermType || null,
          proposedTermTypeApplicableProductTypes:
            findTermType(item.proposedTermType || "")?.applicableProductTypes || [],
          reason: item.reason,
          confidence: item.confidence,
        }));
        const valueCandidates = scopedCandidates.valueCandidates.map((item) => {
          const termType = findTermType(item.termType);
          return {
            candidateId: String(item.id),
            termType: item.termType,
            termTypeDisplayName: termType?.displayName || null,
            valueKind: termType?.valueKind || null,
            applicableProductTypes: termType?.applicableProductTypes || [],
            rawValue: item.rawValue,
            sourceProductType: item.sourceProductType || "unknown",
            itemIndex: item.itemIndex || item.latestOccurrence?.itemIndex || null,
            itemName: item.itemName || item.latestOccurrence?.itemName || null,
            reason: item.reason,
            confidence: item.confidence,
          };
        });
        const input = {
          documentId: state.documentId || null,
          productTypes: state.productTypes,
          termTypes,
          enumValues,
          termTypeCandidates,
          valueCandidates,
        };

        return `${deepSeekReviewInstructions}

输入 JSON：
${JSON.stringify(input, null, 2)}`;
      }

      function parseJsonLoose(text) {
        const trimmed = String(text || "").trim();
        if (!trimmed) {
          throw new Error("请先粘贴 DeepSeek 返回的 JSON");
        }
        const fenced = trimmed.match(/```(?:json)?\\s*([\\s\\S]*?)```/i);
        const unfenced = fenced?.[1] ?? trimmed;
        const jsonText = unfenced.match(/\\{[\\s\\S]*\\}/)?.[0] ?? unfenced;
        return JSON.parse(jsonText);
      }

      function saveSuggestionDraft() {
        localStorage.setItem(
          suggestionDraftKey,
          $("suggestionResponseText")?.value || "",
        );
      }

      function loadMigratedLocalStorageValue(key, legacyKey) {
        const value = localStorage.getItem(key);
        if (value !== null) return value;
        const legacyValue = localStorage.getItem(legacyKey);
        if (legacyValue !== null) {
          localStorage.setItem(key, legacyValue);
        }
        return legacyValue;
      }

      function loadSuggestionDraft() {
        const draft = loadMigratedLocalStorageValue(
          suggestionDraftKey,
          legacySuggestionDraftKey,
        );
        if (draft && $("suggestionResponseText")) {
          $("suggestionResponseText").value = draft;
        }
      }

      function saveAppliedSuggestions(data) {
        localStorage.setItem(suggestionAppliedKey, JSON.stringify(data || {}));
      }

      function loadAppliedSuggestions() {
        const text = loadMigratedLocalStorageValue(
          suggestionAppliedKey,
          legacySuggestionAppliedKey,
        );
        if (!text) return null;
        try {
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      function applyManualReviewSuggestions(data) {
        const termTypeMap = new Map(
          (data.termTypeCandidateSuggestions || []).map((item) => [
            String(item.candidateId),
            item,
          ]),
        );
        const valueMap = new Map(
          (data.valueCandidateSuggestions || []).map((item) => [
            String(item.candidateId),
            item,
          ]),
        );
        state.currentTermTypeCandidates = state.currentTermTypeCandidates.map((item) => ({
          ...item,
          reviewSuggestion: termTypeMap.get(String(item.id)) || item.reviewSuggestion || null,
        }));
        state.currentValueCandidates = state.currentValueCandidates.map((item) => ({
          ...item,
          reviewSuggestion: valueMap.get(String(item.id)) || item.reviewSuggestion || null,
        }));
        renderCandidateLists();
        saveAppliedSuggestions(data);
        setStatus(
          `已应用 DeepSeek 建议：字段 Key ${termTypeMap.size}，字段值 ${valueMap.size}`,
        );
      }

      function setInputValue(form, selector, value) {
        const input = form?.querySelector(selector);
        if (input && value !== undefined && value !== null && value !== "") {
          input.value = value;
          input.dispatchEvent(new Event("change"));
        }
      }

      function setAliasManual(form, name, aliases) {
        const input = form?.querySelector(`[name="${name}"]`);
        if (input && Array.isArray(aliases) && aliases.length) {
          input.value = aliases.join("，");
        }
      }

      function setProductTypeChecks(form, values) {
        if (!form || !Array.isArray(values)) return;
        const selected = new Set(values.map((value) => String(value || "").trim()).filter(Boolean));
        if (!selected.size) return;
        form.querySelectorAll('input[name="applicableProductTypes"]').forEach((input) => {
          input.checked = selected.has(input.value);
        });
      }

      function selectReviewAction(card, action) {
        const button = card.querySelector(`[data-review-action="${action}"]`);
        if (button) button.click();
        return card.querySelector(`form[data-form-kind="${action}"]`);
      }

      function applySuggestionToCard(card) {
        const suggestion = card._candidate?.reviewSuggestion;
        if (!suggestion) return;
        const type = card.dataset.type;

        if (type === "term_type") {
          if (suggestion.recommendedAction === "create_term_type") {
            const form = selectReviewAction(card, "create");
            setInputValue(form, '[name="termType"]', suggestion.suggestedTermType);
            setInputValue(form, '[name="displayName"]', suggestion.suggestedDisplayName);
            setInputValue(form, '[name="quoteDisplayName"]', suggestion.suggestedQuoteDisplayName);
            setInputValue(form, '[name="description"]', suggestion.suggestedDescription);
            setInputValue(form, '[name="category"]', suggestion.suggestedCategory);
            setInputValue(form, '[name="sortOrder"]', suggestion.suggestedSortOrder);
            setInputValue(form, '[name="valueKind"]', suggestion.suggestedValueKind || "enum");
            setProductTypeChecks(form, suggestion.suggestedApplicableProductTypes);
            setAliasManual(form, "aliasNamesManual", suggestion.suggestedAliases);
            const firstValue = (suggestion.suggestedValues || [])[0];
            if (firstValue) {
              setInputValue(form, '[name="valueCanonicalValue"]', firstValue.canonicalValue);
              setAliasManual(form, "valueAliasNamesManual", firstValue.aliases);
            }
            syncEnumValueInputs(form);
          } else if (suggestion.recommendedAction === "approve_as_alias") {
            const form = selectReviewAction(card, "alias");
            setInputValue(form, '[name="termType"]', suggestion.targetTermType);
            setAliasManual(form, "aliasNamesManual", suggestion.suggestedAliases);
            syncEnumValueInputs(form);
          } else if (suggestion.recommendedAction === "reject") {
            const form = selectReviewAction(card, "reject");
            setInputValue(form, '[name="reason"]', suggestion.reason);
          }
          return;
        }

        if (suggestion.recommendedAction === "create_value") {
          const form = selectReviewAction(card, "create");
          setFirstValueRow(form, {
            canonicalValue: suggestion.canonicalValue,
            displayName: suggestion.displayName,
            aliasNames: suggestion.suggestedAliases,
          });
        } else if (suggestion.recommendedAction === "approve_as_alias") {
          const form = selectReviewAction(card, "alias");
          setInputValue(form, '[name="termId"]', suggestion.targetTermId);
          setAliasManual(form, "aliasNamesManual", suggestion.suggestedAliases);
        } else if (suggestion.recommendedAction === "move_to_other_term_type") {
          const form = selectReviewAction(card, "move");
          setInputValue(form, '[name="termType"]', suggestion.targetTermType);
          setInputValue(form, '[name="rawValue"]', suggestion.movedRawValue || card._candidate.rawValue);
          setInputValue(form, '[name="reason"]', suggestion.reason);
        } else if (suggestion.recommendedAction === "split_value") {
          const form = selectReviewAction(card, "split");
          const target = form?.querySelector(".split-target");
          if (target) {
            target.innerHTML = renderSplitRows(
              { termType: "", rawValue: "" },
              suggestion.splits || [],
            );
          }
        } else if (suggestion.recommendedAction === "reject") {
          const form = selectReviewAction(card, "reject");
          setInputValue(form, '[name="reason"]', suggestion.reason);
        }
      }

      function findTermType(termType) {
        return state.termTypes.find((item) => item.termType === termType);
      }

      function valuesForTermType(termType) {
        return state.values.filter((item) => item.termType === termType);
      }

      function renderTermTypePreview(termType) {
        const item = findTermType(termType);
        if (!item) {
          return '<div class="term-preview muted">选择已有字段 Key 后，会在这里显示字段类型和已有字段值。</div>';
        }

        const values = valuesForTermType(termType);
        const valueHtml =
          (item.valueKind === "enum" || item.valueKind === "enums")

              ? values
                  .map(
                    (value) =>
                      `<span class="tag">${escapeHtml(value.displayName || value.canonicalValue)} / ${escapeHtml(value.canonicalValue)}</span>`,
                  )
                  .join("")
              : '<span class="muted">这个枚举字段还没有标准字段值。</span>'
            : '<span class="muted">非枚举字段，不需要标准字段值列表。</span>';

        return `
          <div class="term-preview">
            <div><b>${escapeHtml(item.displayName || item.termType)}</b> <span class="muted">${escapeHtml(item.termType)}</span></div>

      function renderCandidateDocuments(candidate) {
        const documents = Array.isArray(candidate.relatedDocuments)
          ? candidate.relatedDocuments
          : [];
        const fallbackDocumentId = candidate.documentId;
        const ids = documents.length
          ? documents.map((document) => document.id)
          : fallbackDocumentId

      function termTypeLabel(termType) {

      function renderTermTypePickerResults(keyword = "") {
        const normalized = keyword.trim().toLowerCase();
        const results = state.termTypes
          .filter((item) => {
            if (!normalized) return true;
            return [
              item.termType,
              item.displayName,
              item.quoteDisplayName,
              item.category,
              item.valueKind,
            ]
              .filter(Boolean)
              .some((value) => String(value).toLowerCase().includes(normalized));
          })
          .slice(0, 80);

        $("termTypePickerResults").innerHTML = results.length
          ? results
              .map(
                (item) => `
                  <button class="picker-item" type="button" data-term-type="${escapeHtml(item.termType)}">
                    <b>${escapeHtml(item.displayName || item.termType)}</b>
                    <span class="muted">${escapeHtml(item.termType)} · ${escapeHtml(item.valueKind || "enum")} ${item.category ? "· " + escapeHtml(item.category) : ""}</span>
                    <span>${productTypeTags(item.applicableProductTypes)}</span>
                  </button>
                `,
              )
              .join("")
          : '<div class="muted" style="padding:12px">没有匹配的字段 Key。</div>';

        $("termTypePickerResults")
          .querySelectorAll("[data-term-type]")
          .forEach((button) => {
            button.addEventListener("click", () => {
              if (state.activeTermTypeInput) {
                state.activeTermTypeInput.value = button.dataset.termType;
                state.activeTermTypeInput.dispatchEvent(new Event("change"));
              }
              closeTermTypePicker();
